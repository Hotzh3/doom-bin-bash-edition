services:
  game:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doom-bin-bash-game
    working_dir: /app
    command: npm run docker:dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - game_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  game_node_modules:
